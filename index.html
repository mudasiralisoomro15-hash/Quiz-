<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .glass-strong { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .fade-up { animation: fadeUp 0.5s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .opt-btn { width: 100%; text-align: left; padding: 15px; margin-bottom: 10px; border-radius: 12px; background: rgba(255,255,255,0.05); transition: 0.3s; }
        .opt-btn:hover { background: rgba(255,255,255,0.1); }
        .opt-btn.selected { border: 2px solid #4ade80; background: rgba(74, 222, 128, 0.1); }
        .btn-primary { background: #6366f1; color: white; padding: 12px 25px; border-radius: 10px; font-weight: bold; width: 100%; }
        .btn-danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; padding: 8px 15px; border-radius: 8px; border: 1px solid #ef4444; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; color: white; width: 100%; }
    </style>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Aapka updated Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBUUVU_-RNoEXk-M-sw72pzg0IwzvtcgaM",
            authDomain: "quiz-e9e15.firebaseapp.com",
            databaseURL: "https://quiz-e9e15-default-rtdb.firebaseio.com",
            projectId: "quiz-e9e15",
            storageBucket: "quiz-e9e15.firebasestorage.app",
            messagingSenderId: "80407004705",
            appId: "1:80407004705:web:cfd1af4c7e7e82f1886560"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function App() {
            const [screen, setScreen] = React.useState('home');
            const [adminView, setAdminView] = React.useState('results');
            const [questions, setQuestions] = React.useState([]);
            const [results, setResults] = React.useState([]);
            const [name, setName] = React.useState('');
            const [current, setCurrent] = React.useState(0);
            const [selected, setSelected] = React.useState(null);
            const [score, setScore] = React.useState(0);
            const [bulkText, setBulkText] = React.useState('');

            // Real-time data loading
            React.useEffect(() => {
                onValue(ref(db, 'questions'), (snapshot) => {
                    const data = snapshot.val();
                    setQuestions(data ? Object.values(data) : []);
                });
                onValue(ref(db, 'results'), (snapshot) => {
                    const data = snapshot.val();
                    setResults(data ? Object.values(data).reverse() : []);
                });
            }, []);

            const next = () => {
                let newScore = score;
                if(selected === questions[current].a) newScore++;
                
                if(current + 1 < questions.length) {
                    setScore(newScore);
                    setCurrent(current + 1);
                    setSelected(null);
                } else {
                    const finalResult = {
                        name,
                        score: newScore,
                        total: questions.length,
                        percentage: Math.round((newScore/questions.length)*100),
                        time: new Date().toLocaleString()
                    };
                    push(ref(db, 'results'), finalResult);
                    setScore(newScore);
                    setScreen('done');
                }
            };

            if (screen === 'home') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-5">
                    <div className="glass-strong p-8 w-full max-w-md text-center fade-up">
                        <h1 className="text-3xl font-bold mb-6 text-indigo-400">Quiz Portal</h1>
                        <input className="input-field mb-4" placeholder="Apna Naam Likhein" onChange={e=>setName(e.target.value)} />
                        <button className="btn-primary" onClick={() => name ? setScreen('quiz') : alert("Naam zaroori hai!")}>Start Quiz</button>
                        <button className="mt-8 text-zinc-500 text-sm" onClick={() => setScreen('admin')}>Admin Panel</button>
                    </div>
                </div>
            );

            if (screen === 'quiz') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-5">
                    <div className="glass-strong p-6 w-full max-w-lg fade-up">
                        <p className="text-indigo-400 mb-2">Question {current + 1} of {questions.length}</p>
                        <h3 className="text-xl font-semibold mb-6">{questions[current]?.q}</h3>
                        {questions[current]?.options.map((opt, i) => (
                            <button key={i} className={`opt-btn ${selected===opt?'selected':''}`} onClick={()=>setSelected(opt)}>
                                <span className="mr-3 text-indigo-400 font-bold">{String.fromCharCode(65+i)}.</span> {opt}
                            </button>
                        ))}
                        <button className="btn-primary mt-6" disabled={!selected} onClick={next}>Next Question</button>
                    </div>
                </div>
            );

            if (screen === 'done') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-5">
                    <div className="glass-strong p-10 w-full max-w-md text-center fade-up">
                        <h1 className="text-4xl font-bold text-green-400 mb-4">Shukriya!</h1>
                        <p className="text-zinc-400 mb-8">{name}, aapka quiz save ho gaya hai.</p>
                        <div className="text-5xl font-bold mb-2">{score} / {questions.length}</div>
                        <p className="text-zinc-500 mb-10">Percentage: {Math.round((score/questions.length)*100)}%</p>
                        <button className="btn-primary" onClick={()=>window.location.reload()}>Dobara Koshish</button>
                    </div>
                </div>
            );

            if (screen === 'admin') return (
                <div className="p-5 min-h-screen max-w-4xl mx-auto">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className="text-2xl font-bold">🛡️ Control Panel</h2>
                        <button className="bg-zinc-800 px-4 py-2 rounded-lg" onClick={()=>setScreen('home')}>Exit</button>
                    </div>
                    
                    <div className="flex gap-4 mb-8">
                        <button className={`flex-1 p-3 rounded-xl font-bold ${adminView==='results'?'bg-indigo-600':'bg-zinc-900'}`} onClick={()=>setAdminView('results')}>View Results</button>
                        <button className={`flex-1 p-3 rounded-xl font-bold ${adminView==='ai'?'bg-indigo-600':'bg-zinc-900'}`} onClick={()=>setAdminView('ai')}>AI Bulk Import</button>
                    </div>

                    {adminView === 'results' ? (
                        <div className="glass-strong p-4 overflow-hidden">
                            <button className="btn-danger mb-4 w-full" onClick={() => window.confirm("Delete results?") && remove(ref(db, 'results'))}>Clear All Results</button>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="border-b border-zinc-800 text-indigo-400">
                                            <th className="p-3">Name</th>
                                            <th className="p-3 text-center">Score</th>
                                            <th className="p-3 text-center">%</th>
                                            <th className="p-3 text-right">Time</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {results.map((r, i) => (
                                            <tr key={i} className="border-b border-zinc-800/50">
                                                <td className="p-3 font-bold">{r.name}</td>
                                                <td className="p-3 text-center">{r.score}/{r.total}</td>
                                                <td className="p-3 text-center text-green-400">{r.percentage}%</td>
                                                <td className="p-3 text-right text-xs text-zinc-500">{r.time}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    ) : (
                        <div className="glass-strong p-6 fade-up">
                            <h3 className="font-bold mb-4">AI Bulk Import</h3>
                            <textarea 
                                className="input-field h-40 mb-4 font-mono text-sm" 
                                placeholder="Sawal|Option1|Option2|Option3|Option4|CorrectAns"
                                value={bulkText}
                                onChange={e=>setBulkText(e.target.value)}
                            />
                            <button className="btn-primary" onClick={() => {
                                const lines = bulkText.split('\n').filter(l => l.trim());
                                const newQs = lines.map(line => {
                                    const [q, o1, o2, o3, o4, a] = line.split('|');
                                    return { q, options: [o1, o2, o3, o4], a };
                                });
                                set(ref(db, 'questions'), newQs);
                                alert("Sawal Save Ho Gaye!");
                                setBulkText('');
                            }}>Save All Questions</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
