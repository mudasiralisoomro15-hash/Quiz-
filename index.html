<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; padding: 0; background-color: #080810;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const ADMIN_PASSWORD = "admin786";

        const DEFAULT_QUESTIONS = [
          { id: 1, q: "Pakistan ka darul hukumat kaunsa shehar hai?", a: "Lahore", b: "Karachi", c: "Islamabad", d: "Peshawar", ans: "c" },
          { id: 2, q: "Pakistan mein kitne sube hain?", a: "3", b: "4", c: "5", d: "6", ans: "b" },
          { id: 3, q: "Pakistan ka qoumi khel kaunsa hai?", a: "Cricket", b: "Hockey", c: "Football", d: "Kabaddi", ans: "b" },
          { id: 4, q: "Pakistan ki qoumi zaban kaunsi hai?", a: "Punjabi", b: "Sindhi", c: "Urdu", d: "Pashto", ans: "c" },
          { id: 5, q: "Pakistan ka sabse bara shehar kaunsa hai?", a: "Islamabad", b: "Lahore", c: "Karachi", d: "Faisalabad", ans: "c" },
          { id: 6, q: "Quaid-e-Azam ka poora naam kya tha?", a: "Muhammad Ali Jinnah", b: "Liaquat Ali Khan", c: "Iskander Mirza", d: "Yahya Khan", ans: "a" },
          { id: 7, q: "Pakistan ka sabse uncha pahad kaunsa hai?", a: "Nanga Parbat", b: "Broad Peak", c: "K2", d: "Tirich Mir", ans: "c" },
          { id: 8, q: "Pakistan ka qoumi phool kaunsa hai?", a: "Gulab", b: "Chameli", c: "Yasmin", d: "Sunflower", ans: "c" },
          { id: 9, q: "Pakistan Independence Day kab manaya jata hai?", a: "23 March", b: "14 August", c: "6 September", d: "25 December", ans: "b" },
          { id: 10, q: "Allama Iqbal ka yom paidaish kab hai?", a: "9 November", b: "14 August", c: "23 March", d: "25 December", ans: "a" },
          { id: 11, q: "Pakistan mein sabse zyada boli jane wali zaban kaunsi hai?", a: "Urdu", b: "Sindhi", c: "Punjabi", d: "Balochi", ans: "c" },
          { id: 12, q: "Pakistan ka pehla wazir-e-azam kaun tha?", a: "Ayub Khan", b: "Liaquat Ali Khan", c: "Zulfikar Ali Bhutto", d: "Iskander Mirza", ans: "b" },
          { id: 13, q: "Badshahi Mosque kahan hai?", a: "Karachi", b: "Islamabad", c: "Lahore", d: "Multan", ans: "c" },
          { id: 14, q: "Pakistan Resolution kab manzoori hui?", a: "1940", b: "1947", c: "1945", d: "1930", ans: "a" },
          { id: 15, q: "Pakistan ka qoumi janwar kaunsa hai?", a: "Snow Leopard", b: "Markhor", c: "Lion", d: "Tiger", ans: "b" },
          { id: 16, q: "Pakistan ne pahli atomic test kab ki?", a: "1998", b: "1990", c: "2000", d: "1985", ans: "a" },
          { id: 17, q: "CPEC ka poora naam kya hai?", a: "China Pakistan Economic Corridor", b: "Central Pakistan Economic Corridor", c: "China Pakistan Export Cooperation", d: "Central Pakistan Export Corridor", ans: "a" },
          { id: 18, q: "Faisal Mosque kahan hai?", a: "Lahore", b: "Karachi", c: "Islamabad", d: "Rawalpindi", ans: "c" },
          { id: 19, q: "Pakistan ka sabse bara desert kaunsa hai?", a: "Thal Desert", b: "Thar Desert", c: "Cholistan", d: "Kharan", ans: "b" },
          { id: 20, q: "Gwadar kis sube mein hai?", a: "Sindh", b: "Punjab", c: "KPK", d: "Balochistan", ans: "d" },
          { id: 21, q: "Pakistan ka currency kya hai?", a: "Taka", b: "Rupee", c: "Dinar", d: "Dirham", ans: "b" },
          { id: 22, q: "Simla Agreement kab hua?", a: "1971", b: "1972", c: "1973", d: "1965", ans: "b" },
          { id: 23, q: "Pakistan mein kitni official languages hain?", a: "1", b: "2", c: "3", d: "4", ans: "b" },
          { id: 24, q: "Lahore ka purana naam kya tha?", a: "Lahanour", b: "Loh-awar", c: "Lavapuri", d: "Lahwar", ans: "b" },
          { id: 25, q: "Pakistan ka qoumi darya kaunsa hai?", a: "Ravi", b: "Jhelum", c: "Chenab", d: "Indus (Sindh)", ans: "d" },
          { id: 26, q: "Quaid-e-Azam ki date of birth kya hai?", a: "25 December 1876", b: "14 August 1947", c: "23 March 1940", d: "11 September 1948", ans: "a" },
          { id: 27, q: "Pakistan ka area kitna hai (approximately)?", a: "581,000 sq km", b: "796,095 sq km", c: "450,000 sq km", d: "900,000 sq km", ans: "b" },
          { id: 28, q: "Pakistan ka qoumi panda (bird) kaunsa hai?", a: "Parrot", b: "Eagle", c: "Chukar Partridge", d: "Peacock", ans: "c" },
          { id: 29, q: "Pakistan mein sabse pehle Olympic gold medal kisne jita?", a: "Jahangir Khan", b: "Pakistan Hockey Team", c: "Imran Khan", d: "Arshad Nadeem", ans: "b" },
          { id: 30, q: "Pakistan ka sabse bara shehar surface area mein kaunsa hai?", a: "Karachi", b: "Lahore", c: "Quetta", d: "Hyderabad", ans: "a" },
        ];

        const STORAGE_KEY_RESULTS = "quiz_results_v4";
        const STORAGE_KEY_QUESTIONS = "quiz_questions_v4";
        
        const loadStorage = (key, fallback) => { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; } catch { return fallback; } };
        const saveStorage = (key, value) => { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} };

        const SCREEN = { HOME: "home", QUIZ: "quiz", DONE: "done", ADMIN: "admin", ADMINLOGIN: "adminlogin" };

        function App() {
          const [screen, setScreen] = useState(SCREEN.HOME);
          const [name, setName] = useState("");
          const [questions, setQuestions] = useState([]);
          const [results, setResults] = useState([]);
          const [current, setCurrent] = useState(0);
          const [answers, setAnswers] = useState({});
          const [selected, setSelected] = useState(null);
          const [adminPass, setAdminPass] = useState("");
          const [adminError, setAdminError] = useState(false);
          const [adminView, setAdminView] = useState("results");
          const [editQ, setEditQ] = useState(null);
          const [loading, setLoading] = useState(true);

          useEffect(() => {
            const q = loadStorage(STORAGE_KEY_QUESTIONS, DEFAULT_QUESTIONS);
            const r = loadStorage(STORAGE_KEY_RESULTS, []);
            setQuestions(q); setResults(r); setLoading(false);
          }, []);

          const startQuiz = () => { if(name.trim() !== "") { setCurrent(0); setAnswers({}); setSelected(null); setScreen(SCREEN.QUIZ); } };
          
          const next = () => {
            if(!selected) return;
            const newAns = {...answers, [current]: selected}; 
            setAnswers(newAns); 
            setSelected(null);
            
            if(current + 1 < questions.length){ 
                setCurrent(current + 1); 
            } else {
              let score = 0; 
              questions.forEach((q, i) => { if(newAns[i] === q.ans) score++; });
              const entry = { name: name.trim(), score: score, total: questions.length, time: new Date().toLocaleString() };
              const newResults = [...results, entry]; 
              setResults(newResults); 
              saveStorage(STORAGE_KEY_RESULTS, newResults); 
              setScreen(SCREEN.DONE);
            }
          };

          const adminLogin = () => { 
              if(adminPass === ADMIN_PASSWORD) { 
                  setAdminError(false); setAdminPass(""); setScreen(SCREEN.ADMIN); 
              } else {
                  setAdminError(true); 
              }
          };

          const clearResults = () => { if(window.confirm("Sab results delete karna chahte ho?")) { setResults([]); saveStorage(STORAGE_KEY_RESULTS, []); } };
          const saveQuestion = (qObj) => { const updated = questions.map(q => q.id === qObj.id ? qObj : q); setQuestions(updated); saveStorage(STORAGE_KEY_QUESTIONS, updated); setEditQ(null); };
          const resetQuestions = () => { if(window.confirm("Sab questions default par reset karna chahte ho?")) { setQuestions(DEFAULT_QUESTIONS); saveStorage(STORAGE_KEY_QUESTIONS, DEFAULT_QUESTIONS); } };

          // Premium CSS Styling
          const G = `
            @import url('https://fonts.googleapis.com/css2?family=Jameel+Noori+Nastaleeq&family=DM+Sans:wght@400;500;600&display=swap');
            *{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',sans-serif;}
            @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
            .card-theme { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:24px; backdrop-filter:blur(20px); box-shadow:0 30px 60px rgba(0,0,0,0.5); padding:40px; color:#fff; width:100%; max-width:460px; text-align:center; animation:fadeUp 0.4s ease; }
            .btn-theme { width:100%; padding:15px; border-radius:12px; border:none; background:linear-gradient(135deg, #6366f1, #8b5cf6); color:white; font-size:16px; font-weight:600; cursor:pointer; transition:transform 0.2s; margin-top:10px; }
            .btn-theme:hover { transform:translateY(-2px); filter:brightness(1.1); }
            .input-theme { width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:white; font-size:15px; margin-bottom:20px; outline:none; transition:border 0.3s; }
            .input-theme:focus { border-color:#6366f1; }
            .opt-btn { width:100%; padding:14px; margin-bottom:10px; border-radius:12px; text-align:left; cursor:pointer; font-size:15px; display:flex; align-items:center; gap:12px; transition:all 0.2s; }
          `;
          
          const BG = { minHeight:"100vh", background:"#080810", display:"flex", alignItems:"center", justifyContent:"center", padding:20, position:"relative", overflow:"hidden" };

          if(loading) return <div style={BG}><style>{G}</style><p style={{color:"#6366f1"}}>Loading...</p></div>;

          // 1. HOME SCREEN (With Admin Button)
          if(screen === SCREEN.HOME) return (
            <div style={BG}>
              <style>{G}</style>
              <div className="card-theme">
                <h1 style={{fontSize:"42px", marginBottom:"10px", fontWeight:"bold"}}>خوش آمدید</h1>
                <p style={{color:"#9ca3af", marginBottom:"30px", fontSize:"15px"}}>Apna naam likhein aur quiz shuru karein</p>
                
                <input className="input-theme" placeholder="(name)" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&startQuiz()} />
                <button className="btn-theme" onClick={startQuiz}>Quiz Shuru Karein →</button>
                
                <div style={{marginTop:"30px", paddingTop:"20px", borderTop:"1px solid rgba(255,255,255,0.1)"}}>
                  <button onClick={() => setScreen(SCREEN.ADMINLOGIN)} style={{background:"transparent", border:"none", color:"#6366f1", fontSize:"15px", cursor:"pointer", fontWeight:"bold"}}>
                    👑 Admin
                  </button>
                </div>
              </div>
            </div>
          );

          // 2. ADMIN LOGIN SCREEN
          if(screen === SCREEN.ADMINLOGIN) return (
            <div style={BG}>
              <style>{G}</style>
              <div className="card-theme" style={{maxWidth:"360px"}}>
                <h2 style={{fontSize:"26px", marginBottom:"20px"}}>Admin Login</h2>
                <input className="input-theme" type="password" placeholder="Password..." value={adminPass} onChange={e=>setAdminPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&adminLogin()} />
                
                {adminError && <p style={{color:"#f87171", fontSize:"14px", marginBottom:"15px"}}>❌ Galat password</p>}
                
                <button className="btn-theme" onClick={adminLogin} style={{marginBottom:"15px"}}>Login</button>
                <p style={{color:"#9ca3af", cursor:"pointer", fontSize:"14px"}} onClick={()=>setScreen(SCREEN.HOME)}>← Wapas</p>
              </div>
            </div>
          );

          // 3. QUIZ SCREEN
          if(screen === SCREEN.QUIZ) {
            const q = questions[current];
            const prog = ((current + 1) / questions.length) * 100;
            return (
              <div style={BG}>
                <style>{G}</style>
                <div className="card-theme" style={{maxWidth:"600px", textAlign:"left", padding:"35px"}}>
                  <div style={{display:"flex", justifyContent:"space-between", marginBottom:"15px", color:"#9ca3af", fontSize:"14px"}}>
                    <span>👤 {name}</span>
                    <span>Sawal: {current + 1} / {questions.length}</span>
                  </div>
                  
                  <div style={{background:"rgba(255,255,255,0.1)", height:"4px", borderRadius:"4px", marginBottom:"30px"}}>
                    <div style={{background:"#6366f1", height:"100%", width:`${prog}%`, borderRadius:"4px", transition:"width 0.3s"}}></div>
                  </div>

                  <h2 style={{fontSize:"20px", lineHeight:"1.5", marginBottom:"25px"}}>{q.q}</h2>
                  
                  <div>
                    {["a", "b", "c", "d"].map(opt => (
                      <button key={opt} onClick={()=>setSelected(opt)} className="opt-btn" style={{
                        background: selected === opt ? "rgba(99,102,241,0.2)" : "rgba(255,255,255,0.03)",
                        border: selected === opt ? "1px solid #6366f1" : "1px solid rgba(255,255,255,0.1)",
                        color: selected === opt ? "#fff" : "#cbd5e1"
                      }}>
                        <span style={{background: selected===opt ? "#6366f1" : "rgba(255,255,255,0.1)", padding:"5px 12px", borderRadius:"8px", fontWeight:"bold"}}>{opt.toUpperCase()}</span>
                        {q[opt]}
                      </button>
                    ))}
                  </div>

                  <button className="btn-theme" onClick={next} disabled={!selected} style={{
                    opacity: selected ? 1 : 0.5, cursor: selected ? "pointer" : "not-allowed", marginTop:"20px"
                  }}>
                    {current + 1 === questions.length ? "Submit ✓" : "Agla Sawal →"}
                  </button>
                </div>
              </div>
            );
          }

          // 4. DONE SCREEN
          if(screen === SCREEN.DONE) return (
            <div style={BG}>
              <style>{G}</style>
              <div className="card-theme">
                <div style={{fontSize:"50px", marginBottom:"10px"}}>✅</div>
                <h1 style={{fontSize:"36px", marginBottom:"15px", color:"#4ade80"}}>Shukriya!</h1>
                <p style={{fontSize:"18px", color:"#e2e8f0", lineHeight:"1.6", marginBottom:"30px"}}>
                  <strong style={{color:"#8b5cf6"}}>{name}</strong>, aapne quiz mukammal kar liya.<br/>
                  <span style={{color:"#9ca3af", fontSize:"15px"}}>Results shaam ko group mein share kiye jayenge.</span>
                </p>
                <button className="btn-theme" onClick={()=>{setScreen(SCREEN.HOME);setName("");}}>Dusra shakhs →</button>
              </div>
            </div>
          );

          // 5. ADMIN PANEL SCREEN
          if(screen === SCREEN.ADMIN) return (
            <div style={{minHeight:"100vh", background:"#080810", color:"white", padding:"20px"}}>
              <style>{G}</style>
              <div style={{maxWidth:"900px", margin:"0 auto"}}>
                
                {/* Navbar */}
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", background:"rgba(255,255,255,0.05)", padding:"15px 20px", borderRadius:"16px", marginBottom:"20px"}}>
                  <h2 style={{fontSize:"20px", margin:0}}>🛡️ Admin Panel</h2>
                  <div style={{display:"flex", gap:"10px"}}>
                    <button onClick={()=>setAdminView("results")} style={{padding:"8px 16px", borderRadius:"8px", border:"none", background:adminView==="results"?"#6366f1":"rgba(255,255,255,0.1)", color:"white", cursor:"pointer"}}>Results</button>
                    <button onClick={()=>setAdminView("questions")} style={{padding:"8px 16px", borderRadius:"8px", border:"none", background:adminView==="questions"?"#6366f1":"rgba(255,255,255,0.1)", color:"white", cursor:"pointer"}}>Questions</button>
                    <button onClick={()=>setScreen(SCREEN.HOME)} style={{padding:"8px 16px", borderRadius:"8px", border:"none", background:"#ef4444", color:"white", cursor:"pointer"}}>Logout</button>
                  </div>
                </div>

                {/* Results View */}
                {adminView === "results" && (
                  <div style={{background:"rgba(255,255,255,0.03)", borderRadius:"16px", padding:"20px"}}>
                    <div style={{display:"flex", justifyContent:"space-between", marginBottom:"20px"}}>
                      <p style={{fontSize:"16px", color:"#9ca3af"}}>Total participants: <strong style={{color:"white"}}>{results.length}</strong></p>
                      {results.length > 0 && <button onClick={clearResults} style={{background:"#ef4444", color:"white", border:"none", padding:"6px 12px", borderRadius:"6px", cursor:"pointer"}}>Delete All</button>}
                    </div>

                    {results.length === 0 ? (
                      <div style={{textAlign:"center", padding:"40px", color:"#6b7280"}}>Abhi koi result nahi hai.</div>
                    ) : (
                      <div style={{overflowX:"auto"}}>
                        <table style={{width:"100%", borderCollapse:"collapse", textAlign:"left"}}>
                          <thead>
                            <tr style={{background:"rgba(255,255,255,0.05)", color:"#a5b4fc"}}>
                              <th style={{padding:"12px", borderBottom:"1px solid rgba(255,255,255,0.1)"}}>#</th>
                              <th style={{padding:"12px", borderBottom:"1px solid rgba(255,255,255,0.1)"}}>Naam</th>
                              <th style={{padding:"12px", borderBottom:"1px solid rgba(255,255,255,0.1)"}}>Score</th>
                              <th style={{padding:"12px", borderBottom:"1px solid rgba(255,255,255,0.1)"}}>Percentage</th>
                              <th style={{padding:"12px", borderBottom:"1px solid rgba(255,255,255,0.1)"}}>Waqt</th>
                            </tr>
                          </thead>
                          <tbody>
                            {results.map((r, i) => {
                              const pct = Math.round((r.score / r.total) * 100);
                              const col = pct >= 70 ? "#4ade80" : pct >= 40 ? "#fbbf24" : "#f87171";
                              return (
                                <tr key={i} style={{borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                                  <td style={{padding:"12px"}}>{i + 1}</td>
                                  <td style={{padding:"12px", fontWeight:"bold"}}>{r.name}</td>
                                  <td style={{padding:"12px"}}>{r.score} / {r.total}</td>
                                  <td style={{padding:"12px"}}><span style={{color:col}}>{pct}%</span></td>
                                  <td style={{padding:"12px", color:"#9ca3af", fontSize:"14px"}}>{r.time}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                )}

                {/* Questions View */}
                {adminView === "questions" && (
                  <div style={{background:"rgba(255,255,255,0.03)", borderRadius:"16px", padding:"20px"}}>
                    {editQ ? (
                      <QEditor q={editQ} onSave={saveQuestion} onCancel={()=>setEditQ(null)} />
                    ) : (
                      <div>
                        {questions.map((q, i) => (
                          <div key={q.id} style={{display:"flex", justifyContent:"space-between", alignItems:"center", background:"rgba(255,255,255,0.05)", padding:"12px 15px", borderRadius:"8px", marginBottom:"8px"}}>
                            <span style={{color:"#e2e8f0"}}><strong style={{color:"#6366f1", marginRight:"10px"}}>{i+1}.</strong>{q.q}</span>
                            <button onClick={()=>setEditQ({...q})} style={{background:"#4b5563", color:"white", border:"none", padding:"6px 12px", borderRadius:"6px", cursor:"pointer"}}>Edit</button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          );
        }

        function QEditor({q, onSave, onCancel}) {
          const [form, setForm] = useState({...q});
          const set = (k, v) => setForm(f => ({...f, [k]: v}));
          return (
            <div style={{background:"rgba(255,255,255,0.05)", padding:"20px", borderRadius:"12px"}}>
              <h3 style={{marginBottom:"15px", color:"#a5b4fc"}}>Sawal Edit Karein</h3>
              <input style={{width:"100%", padding:"10px", marginBottom:"10px", background:"#111", color:"white", border:"1px solid #333", borderRadius:"6px"}} value={form.q} onChange={e=>set("q", e.target.value)} />
              {["a", "b", "c", "d"].map(opt => (
                <div key={opt} style={{display:"flex", gap:"10px", marginBottom:"10px"}}>
                  <button onClick={()=>set("ans", opt)} style={{background: form.ans === opt ? "#6366f1" : "#333", color:"white", border:"none", padding:"10px", borderRadius:"6px", cursor:"pointer"}}>{opt.toUpperCase()}</button>
                  <input style={{flex:1, padding:"10px", background:"#111", color:"white", border:"1px solid #333", borderRadius:"6px"}} value={form[opt]} onChange={e=>set(opt, e.target.value)} />
                </div>
              ))}
              <div style={{marginTop:"20px", display:"flex", gap:"10px"}}>
                <button onClick={()=>onSave(form)} style={{background:"#10b981", color:"white", padding:"10px 20px", border:"none", borderRadius:"6px", cursor:"pointer"}}>Save ✓</button>
                <button onClick={onCancel} style={{background:"#ef4444", color:"white", padding:"10px 20px", border:"none", borderRadius:"6px", cursor:"pointer"}}>Cancel</button>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
