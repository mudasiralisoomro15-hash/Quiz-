<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Quiz Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; padding: 0; background-color: #080810;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const ADMIN_PASSWORD = "admin786";

        // Version update to ensure clean data
        const SK_R = "qr_v8", SK_Q = "qq_v8", SK_L = "ql_v8";

        const DEFAULT_QUESTIONS = [
            { id: 1, q: "Pakistan ka qoumi khel kaunsa hai?", a: "Cricket", b: "Hockey", c: "Football", d: "Kabaddi", ans: "b" },
            { id: 2, q: "Pakistan ka darul hukumat?", a: "Lahore", b: "Karachi", c: "Islamabad", d: "Peshawar", ans: "c" }
        ];

        const loadS = (key, fb) => { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fb; } catch { return fb; } };
        const saveS = (key, v) => { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} };

        function App() {
            const [screen, setScreen] = useState("home");
            const [name, setName] = useState("");
            const [questions, setQuestions] = useState([]);
            const [displayLimit, setDisplayLimit] = useState(10);
            const [results, setResults] = useState([]);
            const [current, setCurrent] = useState(0);
            const [answers, setAnswers] = useState({});
            const [selected, setSelected] = useState(null);
            const [adminPass, setAdminPass] = useState("");
            const [adminView, setAdminView] = useState("results");
            const [clicks, setClicks] = useState(0);
            const [editQ, setEditQ] = useState(null);
            const [bulkText, setBulkText] = useState("");

            useEffect(() => {
                setQuestions(loadS(SK_Q, DEFAULT_QUESTIONS));
                setResults(loadS(SK_R, []));
                setDisplayLimit(loadS(SK_L, 10));
            }, []);

            const secretClick = () => { setClicks(c => { if(c+1 >= 5) { setScreen("login"); return 0; } return c+1; }); };
            
            const handleBulkImport = () => {
                const lines = bulkText.split('\n').filter(l => l.trim() !== "");
                const newQs = lines.map((line, index) => {
                    const [q, a, b, c, d, ans] = line.split('|');
                    return { id: Date.now() + index, q, a, b, c, d, ans: ans?.trim().toLowerCase() };
                });
                if(newQs.length > 0) {
                    setQuestions(newQs);
                    saveS(SK_Q, newQs);
                    setBulkText("");
                    alert("Quiz Updated Successfully!");
                }
            };

            const finishQuiz = (finalAnswers) => {
                let score = 0;
                const activeQs = questions.slice(0, displayLimit);
                activeQs.forEach((q, i) => { if (finalAnswers[i] === q.ans) score++; });
                const percentage = Math.round((score / displayLimit) * 100);
                const nr = [...results, { name: name.trim(), score, total: displayLimit, percentage, time: new Date().toLocaleString() }];
                setResults(nr); saveS(SK_R, nr); setScreen("done");
            };

            const next = () => {
                const na = { ...answers, [current]: selected }; setAnswers(na); setSelected(null);
                if (current + 1 < displayLimit && current + 1 < questions.length) { setCurrent(c => c + 1); }
                else { finishQuiz(na); }
            };

            const G = `
                *{box-sizing:border-box;font-family:sans-serif;}
                .card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:30px; color:white; width:100%; max-width:500px; }
                .btn { width:100%; padding:12px; border-radius:10px; border:none; background:linear-gradient(to right, #6366f1, #a855f7); color:white; font-weight:bold; cursor:pointer; margin:5px 0; }
                .input { width:100%; padding:12px; border-radius:10px; border:1px solid #333; background:#111; color:white; margin-bottom:15px; }
                .opt { width:100%; padding:12px; margin:5px 0; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid #333; color:white; text-align:left; cursor:pointer; }
            `;

            if (screen === "home") return (
                <div style={{minHeight:"100vh", background:"#080810", display:"flex", alignItems:"center", justifyContent:"center", padding:20}}>
                    <style>{G}</style>
                    <div className="card" style={{textAlign:"center"}}>
                        <h1>Welcome!</h1>
                        <p style={{color:"#888"}}>Enter your name to start the quiz</p>
                        <input className="input" placeholder="Your Name..." onChange={e=>setName(e.target.value)} />
                        <button className="btn" onClick={() => name.trim() && setScreen("quiz")}>Start Quiz →</button>
                        <div onClick={secretClick} style={{marginTop:40, color:"#080810", userSelect:"none"}}>● ● ●</div>
                    </div>
                </div>
            );

            if (screen === "login") return (
                <div style={{minHeight:"100vh", background:"#080810", display:"flex", alignItems:"center", justifyContent:"center"}}>
                    <style>{G}</style>
                    <div className="card">
                        <h2>Admin Login</h2>
                        <input className="input" type="password" onChange={e=>setAdminPass(e.target.value)} />
                        <button className="btn" onClick={() => adminPass === ADMIN_PASSWORD && setScreen("admin")}>Login</button>
                    </div>
                </div>
            );

            if (screen === "quiz") return (
                <div style={{minHeight:"100vh", background:"#080810", display:"flex", alignItems:"center", justifyContent:"center", padding:20}}>
                    <style>{G}</style>
                    <div className="card">
                        <p style={{color:"#6366f1"}}>Question {current+1} of {displayLimit}</p>
                        <h3 style={{margin:"20px 0"}}>{questions[current]?.q}</h3>
                        {["a","b","c","d"].map(o => (
                            <button key={o} className="opt" onClick={()=>setSelected(o)} style={{borderColor:selected===o?"#6366f1":"#333"}}>{o.toUpperCase()}) {questions[current]?.[o]}</button>
                        ))}
                        <button className="btn" onClick={next} disabled={!selected}>Next</button>
                    </div>
                </div>
            );

            if (screen === "done") return (
                <div style={{minHeight:"100vh", background:"#080810", display:"flex", alignItems:"center", justifyContent:"center", textAlign:"center"}}>
                    <style>{G}</style>
                    <div className="card">
                        <h1 style={{color:"#4ade80"}}>Shukriya!</h1>
                        <p>{name}, aapka quiz mukammal ho gaya.</p>
                        <p style={{color:"#888", fontSize:"14px"}}>Results group mein send kar diye jayenge.</p>
                        <button className="btn" onClick={() => window.location.reload()}>دوسرا شخص →</button>
                    </div>
                </div>
            );

            if (screen === "admin") return (
                <div style={{padding:20, color:"white", background:"#080810", minHeight:"100vh"}}>
                    <style>{G}</style>
                    <div style={{maxWidth:800, margin:"auto"}}>
                        <div style={{display:"flex", justifyContent:"space-between", marginBottom:20}}>
                            <h2>🛡️ Admin Panel</h2>
                            <button className="btn" style={{width:"auto", padding:"5px 15px"}} onClick={()=>setScreen("home")}>Logout</button>
                        </div>
                        
                        <div style={{display:"flex", gap:10, marginBottom:20}}>
                            <button className="btn" onClick={()=>setAdminView("results")}>Results</button>
                            <button className="btn" style={{background:"#444"}} onClick={()=>setAdminView("ai")}>AI Bulk Import</button>
                        </div>

                        {adminView === "results" ? (
                            <table style={{width:"100%", borderCollapse:"collapse"}}>
                                <thead style={{background:"#222"}}>
                                    <tr><th style={{padding:10}}>Name</th><th style={{padding:10}}>Score</th><th style={{padding:10}}>%</th><th style={{padding:10}}>Time</th></tr>
                                </thead>
                                <tbody>
                                    {results.map((r,i) => (
                                        <tr key={i} style={{borderBottom:"1px solid #222", textAlign:"center"}}>
                                            <td style={{padding:10}}>{r.name}</td>
                                            <td style={{padding:10}}>{r.score}/{r.total}</td>
                                            <td style={{padding:10, color:"#4ade80"}}>{r.percentage}%</td>
                                            <td style={{padding:10, color:"#666"}}>{r.time}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        ) : (
                            <div>
                                <h3>AI Bulk Import</h3>
                                <p style={{fontSize:12, color:"#888"}}>AI se sawal banwa kar yahan paste karein (Format: Question|A|B|C|D|ans)</p>
                                <textarea className="input" style={{height:150}} value={bulkText} onChange={e=>setBulkText(e.target.value)} placeholder="Physics Question|Opt1|Opt2|Opt3|Opt4|c"></textarea>
                                <button className="btn" onClick={handleBulkImport}>Update Quiz Now</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
