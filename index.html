<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Quiz Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; background: #080810;">
    <div id="root"></div>

    <script type="text/babel">
        // React Hooks ko load karna
        const { useState, useEffect } = React;

        const ADMIN_PASSWORD = "admin786";

        const DEFAULT_QUESTIONS = [
          { id: 1, q: "Pakistan ka darul hukumat kaunsa shehar hai?", a: "Lahore", b: "Karachi", c: "Islamabad", d: "Peshawar", ans: "c" },
          { id: 2, q: "Pakistan mein kitne sube hain?", a: "3", b: "4", c: "5", d: "6", ans: "b" },
          { id: 3, q: "Pakistan ka qoumi khel kaunsa hai?", a: "Cricket", b: "Hockey", c: "Football", d: "Kabaddi", ans: "b" },
          { id: 4, q: "Pakistan ki qoumi zaban kaunsi hai?", a: "Punjabi", b: "Sindhi", c: "Urdu", d: "Pashto", ans: "c" },
          { id: 5, q: "Pakistan ka sabse bara shehar kaunsa hai?", a: "Islamabad", b: "Lahore", c: "Karachi", d: "Faisalabad", ans: "c" },
          { id: 6, q: "Quaid-e-Azam ka poora naam kya tha?", a: "Muhammad Ali Jinnah", b: "Liaquat Ali Khan", c: "Iskander Mirza", d: "Yahya Khan", ans: "a" },
          { id: 7, q: "Pakistan ka sabse uncha pahad kaunsa hai?", a: "Nanga Parbat", b: "Broad Peak", c: "K2", d: "Tirich Mir", ans: "c" },
          { id: 8, q: "Pakistan ka qoumi phool kaunsa hai?", a: "Gulab", b: "Chameli", c: "Yasmin", d: "Sunflower", ans: "c" },
          { id: 9, q: "Pakistan Independence Day kab manaya jata hai?", a: "23 March", b: "14 August", c: "6 September", d: "25 December", ans: "b" },
          { id: 10, q: "Allama Iqbal ka yom paidaish kab hai?", a: "9 November", b: "14 August", c: "23 March", d: "25 December", ans: "a" }
        ];

        // Storage functions (Simple browser storage)
        const loadS = (key, fb) => {
            const r = localStorage.getItem(key);
            return r ? JSON.parse(r) : fb;
        };
        const saveS = (key, v) => localStorage.setItem(key, JSON.stringify(v));

        function App() {
            const [screen, setScreen] = useState("home");
            const [name, setName] = useState("");
            const [questions, setQuestions] = useState(DEFAULT_QUESTIONS);
            const [current, setCurrent] = useState(0);
            const [selected, setSelected] = useState(null);
            const [score, setScore] = useState(0);

            // CSS Styles as JavaScript Object
            const styles = {
                bg: { minHeight: "100vh", background: "#080810", display: "flex", alignItems: "center", justifyContent: "center", padding: "20px", fontFamily: "sans-serif" },
                card: { background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "24px", padding: "40px", width: "100%", maxWidth: "440px", textAlign: "center", color: "#fff" },
                input: { width: "100%", padding: "12px", borderRadius: "10px", border: "1px solid #333", background: "#111", color: "#fff", marginBottom: "20px", boxSizing: "border-box" },
                btn: { width: "100%", padding: "14px", borderRadius: "10px", border: "none", background: "linear-gradient(135deg, #6366f1, #8b5cf6)", color: "#fff", fontWeight: "bold", cursor: "pointer" },
                opt: (isSelected) => ({
                    width: "100%", padding: "12px", margin: "8px 0", borderRadius: "10px", border: isSelected ? "2px solid #6366f1" : "1px solid #333",
                    background: isSelected ? "rgba(99,102,241,0.2)" : "#111", color: "#fff", textAlign: "left", cursor: "pointer"
                })
            };

            const startQuiz = () => { if(name) setScreen("quiz"); };

            const next = () => {
                if(selected === questions[current].ans) setScore(score + 1);
                setSelected(null);
                if(current + 1 < questions.length) setCurrent(current + 1);
                else setScreen("done");
            };

            if (screen === "home") return (
                <div style={styles.bg}>
                    <div style={styles.card}>
                        <h1 style={{fontSize: "32px"}}>Welcome!</h1>
                        <p style={{color: "#888"}}>Enter your name to start</p>
                        <input style={styles.input} placeholder="Aapka Naam..." onChange={(e)=>setName(e.target.value)} />
                        <button style={styles.btn} onClick={startQuiz}>Start Quiz →</button>
                    </div>
                </div>
            );

            if (screen === "quiz") return (
                <div style={styles.bg}>
                    <div style={styles.card}>
                        <h3>Question {current + 1}</h3>
                        <p style={{fontSize: "18px"}}>{questions[current].q}</p>
                        {['a','b','c','d'].map(opt => (
                            <button key={opt} style={styles.opt(selected === opt)} onClick={()=>setSelected(opt)}>
                                {opt.toUpperCase()}. {questions[current][opt]}
                            </button>
                        ))}
                        <button style={{...styles.btn, marginTop: "20px"}} onClick={next} disabled={!selected}>Next →</button>
                    </div>
                </div>
            );

            if (screen === "done") return (
                <div style={styles.bg}>
                    <div style={styles.card}>
                        <h1>Result</h1>
                        <p>{name}, aapka score hai:</p>
                        <h2 style={{color: "#6366f1"}}>{score} / {questions.length}</h2>
                        <button style={styles.btn} onClick={()=>window.location.reload()}>Try Again</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
