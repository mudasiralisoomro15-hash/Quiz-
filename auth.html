<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Tournament Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 40px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        h2 { color: #f39c12; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #f39c12; border: none; color: black; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #e67e22; }
        .google-btn { background: white; color: #444; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .google-btn:hover { background: #eee; }
        p { font-size: 14px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>PUBG ELITE</h2>
    
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    
    <button onclick="handleEmailSignup()">Create Account</button>
    <button onclick="handleEmailLogin()" style="background: transparent; color: #f39c12; border: 1px solid #f39c12;">Login</button>

    <p>— OR —</p>

    <button class="google-btn" onclick="handleGoogleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
        Continue with Google
    </button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Aapka copied config code
  const firebaseConfig = {
    apiKey: "AIzaSyAptLsBRok7n3C6ir42AbBsWVZ-yl9sxOQ",
    authDomain: "pubg-tournament-6e9d3.firebaseapp.com",
    projectId: "pubg-tournament-6e9d3",
    storageBucket: "pubg-tournament-6e9d3.firebasestorage.app",
    messagingSenderId: "409972059757",
    appId: "1:409972059757:web:73b6244f3fc9de368c5964",
    measurementId: "G-CGBY4BCMWW"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // 1. Google Login
  window.handleGoogleLogin = async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      await saveUserToFirestore(result.user);
      alert("Login Successful with Google!");
    } catch (error) { alert(error.message); }
  };

  // 2. Email Signup
  window.handleEmailSignup = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      const result = await createUserWithEmailAndPassword(auth, email, password);
      await saveUserToFirestore(result.user);
      alert("Account Created!");
    } catch (error) { alert(error.message); }
  };

  // 3. Email Login
  window.handleEmailLogin = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
      alert("Welcome Back!");
    } catch (error) { alert(error.message); }
  };

  // User ka data Firestore mein save karne ka function
  async function saveUserToFirestore(user) {
    await setDoc(doc(db, "users", user.uid), {
      uid: user.uid,
      email: user.email,
      name: user.displayName || "Player",
      lastLogin: new Date()
    }, { merge: true });
  }
</script>

</body>
</html>
